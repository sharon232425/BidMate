{% extends "base.html" %}

{% block content %}

<!-- Banner Section -->
<div class="text-center mb-5">

    <img src="{{ url_for('static', filename='banner.png') }}"
         class="img-fluid rounded-4 shadow-lg"
         style="width:100%; max-height:600px; object-fit:cover;">

</div>

<!-- Search Bar -->
<form method="GET" action="/">

    <div class="input-group mb-5 shadow">

        <input type="text"
               name="search"
               class="form-control form-control-lg"
               placeholder="🔍 Search for hostel products, projects, electronics...">

        <button type="submit"
                class="btn btn-primary btn-lg">
            Search
        </button>

    </div>

</form>

<!-- Products -->
<div class="row">

{% for item in items %}

<div class="col-md-4 mb-4">

    <div class="card h-100 shadow-lg border-0">

        {% if item.image %}
        <img src="{{ item.image }}"
             class="card-img-top"
             height="250"
             style="object-fit:cover;">
        {% endif %}

        <div class="card-body">

            <h4 class="fw-bold text-primary">
                {{ item.title }}
            </h4>

            <p class="text-muted">
                {{ item.description[:100] }}...
            </p>

            <h3 class="text-success fw-bold">
                ₹{{ item.price }}
            </h3>

            <span class="badge bg-info fs-6">
                {{ item.category }}
            </span>

            <br><br>

            <a href="/item/{{ item.id }}"
               class="btn btn-success w-100">
                🔨 View & Bid
            </a>

        </div>

    </div>

</div>

{% else %}

<div class="col-12">

    <div class="alert alert-warning text-center">
        No products found.
    </div>

</div>

{% endfor %}

</div>

{% endblock %}
